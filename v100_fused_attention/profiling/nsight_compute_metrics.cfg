# ============================================================================
# Nsight Compute Metrics Configuration for Volta V100 Fused Attention
# ============================================================================
# This file tracks hardware telemetry to validate the empirical Roofline Model 
# and diagnose micro-architectural bottlenecks as defined in the project 
# blueprint.

# ----------------------------------------------------------------------------
# 1. Throughput and Efficiency (Roofline Y-Axis)
# ----------------------------------------------------------------------------
# Overall SM utilization
sm__throughput.avg.pct_of_peak

# Tensor Core specific throughput - Target high values for compute-bound kernels
sm__inst_executed_pipe_tensor.avg.pct_of_peak

# ----------------------------------------------------------------------------
# 2. Arithmetic Intensity (Roofline X-Axis)
# ----------------------------------------------------------------------------
# Floating Point Operations (FP32 Accumulation used in the fused kernel)
smsp__sass_thread_inst_executed_op_fadd_pred_on.sum
smsp__sass_thread_inst_executed_op_fmul_pred_on.sum
smsp__sass_thread_inst_executed_op_ffma_pred_on.sum

# Global Memory Traffic (HBM2) - Used for bytes transferred calculation
dram__bytes_read.sum
dram__bytes_write.sum

# ----------------------------------------------------------------------------
# 3. Micro-Architectural Stall Analysis (Section 5.2)
# ----------------------------------------------------------------------------
# Warp Occupancy vs. Register Pressure: Measures warp residency
smsp_warps_active.avg.pct_of_peak

# Execution Pipeline Saturation: High values indicate saturated Tensor Cores
smsp__compute_inst_stalled_math_pipe_throttle_pct

# Software Pipelining Efficacy: Measures stalls waiting for memory data
smsp__compute_inst_stalled_mem_throttle_pct

# ----------------------------------------------------------------------------
# 4. Shared Memory & Bank Conflict Diagnostics (Section 5.2)
# ----------------------------------------------------------------------------
# Shared Memory Wavefronts: Used to prove XOR swizzling success
l1tex__data_pipe_lsu_wavefronts_mem_shared.sum
l1tex__data_pipe_lsu_requests_mem_shared.sum

# ----------------------------------------------------------------------------
# 5. Cache Performance
# ----------------------------------------------------------------------------
# L1/Shared Memory hit rates for global-to-shared transactions
l1tex__t_sector_hit_rate.pct